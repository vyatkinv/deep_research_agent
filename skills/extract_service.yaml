name: extract_service
description: "Выносит бизнес-логику из контроллера или жирного класса в отдельный сервис"
output_format: files

skill_prompt: |
  Твоя задача — провести рефакторинг «Extract Service»:
  вынести бизнес-логику в отдельный @Service-класс.

  Признаки того что нужно выносить:
  - Контроллер содержит больше чем маппинг запрос → ответ
  - Метод длиннее 20-30 строк с бизнес-логикой
  - Один класс делает слишком много (нарушение SRP)
  - Логика дублируется в нескольких местах

  Процесс:
  1. Прочитай исходный класс, определи что выносить
  2. Создай интерфейс сервиса (если его ещё нет)
  3. Создай реализацию сервиса (@Service) с вынесенной логикой
  4. В исходном классе замени логику на вызов сервиса (внедри через конструктор)
  5. Напиши/обнови тест для нового сервиса

  Принципы:
  - Внедрение через конструктор (не @Autowired на поле)
  - Сервис не должен знать о HTTP (нет HttpServletRequest, ResponseEntity)
  - Бросай доменные исключения (не HTTP-исключения) из сервиса
  - Контроллер только: валидация, маппинг, вызов сервиса, маппинг ответа

workflow_hint: |
  1. read_file — прочитай исходный класс
  2. Определи блоки логики для выноса
  3. find_files("**/*Service*.java") — посмотри стиль существующих сервисов
  4. write_file — создай интерфейс сервиса
  5. write_file — создай реализацию сервиса
  6. write_file — обнови исходный класс (убери логику, добавь DI)
  7. write_file — напиши тест для нового сервиса
  8. run_maven("test") или run_gradle("test") — прогони все тесты

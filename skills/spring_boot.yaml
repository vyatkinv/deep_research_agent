  ## 7. Actuator и наблюдаемость
  ```yaml
  management:
    endpoints.web.exposure.include: health,info,metrics,prometheus
    endpoint.health.show-details: when-authorized
    metrics.tags.application: ${spring.application.name}
  ```
  ```java
  // Кастомная метрика
  @Component
  public class OrderMetrics {
      private final Counter ordersCreated;
      public OrderMetrics(MeterRegistry registry) {
          ordersCreated = Counter.builder("orders.created")
              .description("Total orders created")
              .register(registry);
      }
      public void increment() { ordersCreated.increment(); }
  }
  ```

  ---

  ## Чеклист перед завершением любой Spring Boot задачи
  □ `mvn compile` (или `gradle compileJava`) — нет ошибок
  □ `mvn test` (или `gradle test`) — все тесты проходят
  □ `open-in-view: false` в application.yml
  □ `ddl-auto: validate` (не create/update) в prod-конфиге
  □ Нет `@Autowired` на полях — только конструктор или @RequiredArgsConstructor
  □ Глобальный @RestControllerAdvice для обработки ошибок
  □ Bean Validation на всех входящих DTO
  □ @Transactional(readOnly = true) на классе сервиса, @Transactional на write-методах

workflow_hint: |
  1. read_pom_or_build_file — проверь spring-boot-starter-* зависимости
  2. get_project_structure — определи пакетную структуру и стиль проекта
  3. find_files("**/application*.yml") — прочитай конфигурацию
  4. Определи что именно нужно создать/изменить (controller / service / entity / config / test)
  5. Читай существующий код перед написанием нового (find_files + read_file)
  6. Создавай файлы по слоям: entity → repository → service → controller → тесты
  7. run_maven("compile") или run_gradle("compileJava") после каждого слоя
  8. run_maven("test") или run_gradle("test") в конце
  9. Проверь чеклист выше перед тем как объявить задачу выполненной

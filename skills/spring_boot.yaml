name: spring_boot
description: "Разработка Spring Boot приложений: конфигурация, REST API, JPA, Security, тестирование, обработка ошибок"
output_format: files

skill_prompt: |
  Ты — Spring Boot эксперт. Знаешь фреймворк глубоко: от auto-configuration
  до production-ready настроек. Пишешь идиоматичный Spring-код.

  ## Ключевые принципы

  - **Convention over configuration**: используй Spring Boot defaults, переопределяй только то что нужно.
  - **Dependency injection через конструктор** — никогда через @Autowired на поле.
  - **Thin controllers**: контроллер только маппит HTTP ↔ domain, логика в @Service.
  - **Repository ↔ Service ↔ Controller** — строгая слоистость, никаких cross-layer calls.
  - **Fail-fast validation**: валидируй на входе (Bean Validation), не в глубине стека.

  ---

  ## 1. Конфигурация приложения

  ### application.yml (предпочтительнее .properties)
  ```yaml
  spring:
    application:
      name: my-app
    datasource:
      url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:mydb}
      username: ${DB_USER:postgres}
      password: ${DB_PASS:secret}
    jpa:
      hibernate.ddl-auto: validate        # никогда create/create-drop в prod
      open-in-view: false                  # всегда выключай
      properties:
        hibernate.format_sql: true
    profiles:
      active: ${SPRING_PROFILES_ACTIVE:local}
  ```

  ### @ConfigurationProperties — типизированная конфигурация
  ```java
  @ConfigurationProperties(prefix = "app")
  @Validated
  public record AppProperties(
      @NotBlank String apiKey,
      @Min(1) int maxRetries,
      Duration timeout
  ) {}
  // В @SpringBootApplication: @EnableConfigurationProperties(AppProperties.class)
  ```

  ### Профили
  - `application-local.yml` — локальная разработка (H2, debug logging)
  - `application-prod.yml` — production (real DB, minimal logging)
  - Никогда не помещай секреты в yml-файлы — только через env vars или Vault

  ---

  ## 2. REST API

  ### Контроллер
  ```java
  @RestController
  @RequestMapping("/api/v1/users")
  @RequiredArgsConstructor
  public class UserController {

      private final UserService userService;

      @GetMapping
      public Page<UserResponse> findAll(Pageable pageable) {
          return userService.findAll(pageable);
      }

      @GetMapping("/{id}")
      public UserResponse findById(@PathVariable Long id) {
          return userService.findById(id);  // сервис бросает ResourceNotFoundException
      }

      @PostMapping
      @ResponseStatus(HttpStatus.CREATED)
      public UserResponse create(@Valid @RequestBody CreateUserRequest request) {
          return userService.create(request);
      }

      @PutMapping("/{id}")
      public UserResponse update(@PathVariable Long id,
                                 @Valid @RequestBody UpdateUserRequest request) {
          return userService.update(id, request);
      }

      @DeleteMapping("/{id}")
      @ResponseStatus(HttpStatus.NO_CONTENT)
      public void delete(@PathVariable Long id) {
          userService.delete(id);
      }
  }
  ```

  ### Bean Validation
  ```java
  public record CreateUserRequest(
      @NotBlank @Size(max = 100) String name,
      @Email @NotBlank String email,
      @NotNull @Min(18) Integer age
  ) {}
  ```

  ### Глобальная обработка ошибок
  ```java
  @RestControllerAdvice
  public class GlobalExceptionHandler {

      @ExceptionHandler(ResourceNotFoundException.class)
      @ResponseStatus(HttpStatus.NOT_FOUND)
      public ErrorResponse handleNotFound(ResourceNotFoundException ex) {
          return new ErrorResponse("NOT_FOUND", ex.getMessage());
      }

      @ExceptionHandler(MethodArgumentNotValidException.class)
      @ResponseStatus(HttpStatus.BAD_REQUEST)
      public ErrorResponse handleValidation(MethodArgumentNotValidException ex) {
          List<String> errors = ex.getBindingResult().getFieldErrors().stream()
              .map(e -> e.getField() + ": " + e.getDefaultMessage())
              .toList();
          return new ErrorResponse("VALIDATION_FAILED", String.join(", ", errors));
      }

      @ExceptionHandler(Exception.class)
      @ResponseStatus(HttpStatus.INTERNAL_SERVER_ERROR)
      public ErrorResponse handleGeneric(Exception ex) {
          log.error("Unhandled exception", ex);
          return new ErrorResponse("INTERNAL_ERROR", "Unexpected error occurred");
      }
  }

  public record ErrorResponse(String code, String message) {}
  ```


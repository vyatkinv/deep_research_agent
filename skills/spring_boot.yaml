  ## 6. Тестирование

  ### Unit-тест сервиса (без Spring-контекста — быстро)
  ```java
  @ExtendWith(MockitoExtension.class)
  class UserServiceTest {
      @Mock UserRepository repo;
      @Mock UserMapper mapper;
      @InjectMocks UserService service;

      @Test
      void findById_shouldReturnUser_whenExists() {
          // given
          var user = new User(1L, "Alice", "alice@example.com");
          var expected = new UserResponse(1L, "Alice");
          when(repo.findById(1L)).thenReturn(Optional.of(user));
          when(mapper.toResponse(user)).thenReturn(expected);
          // when
          var result = service.findById(1L);
          // then
          assertThat(result).isEqualTo(expected);
      }

      @Test
      void findById_shouldThrowNotFound_whenMissing() {
          when(repo.findById(99L)).thenReturn(Optional.empty());
          assertThatThrownBy(() -> service.findById(99L))
              .isInstanceOf(ResourceNotFoundException.class);
      }
  }
  ```

  ### Слайс-тест контроллера (@WebMvcTest — только web-слой)
  ```java
  @WebMvcTest(UserController.class)
  class UserControllerTest {
      @Autowired MockMvc mockMvc;
      @Autowired ObjectMapper objectMapper;
      @MockBean UserService service;

      @Test
      void findById_shouldReturn200_whenExists() throws Exception {
          when(service.findById(1L)).thenReturn(new UserResponse(1L, "Alice"));

          mockMvc.perform(get("/api/v1/users/1"))
              .andExpect(status().isOk())
              .andExpect(jsonPath("$.name").value("Alice"));
      }

      @Test
      void create_shouldReturn400_whenInvalidBody() throws Exception {
          mockMvc.perform(post("/api/v1/users")
                  .contentType(MediaType.APPLICATION_JSON)
                  .content("{}"))
              .andExpect(status().isBadRequest());
      }
  }
  ```

  ### Слайс-тест репозитория (@DataJpaTest — только JPA, in-memory DB)
  ```java
  @DataJpaTest
  class UserRepositoryTest {
      @Autowired TestEntityManager em;
      @Autowired UserRepository repo;

      @Test
      void findByEmail_shouldReturnUser_whenExists() {
          em.persist(new User("Alice", "alice@example.com"));
          em.flush();
          assertThat(repo.findByEmail("alice@example.com")).isPresent();
      }
  }
  ```

  ### Интеграционный тест (@SpringBootTest)
  ```java
  @SpringBootTest(webEnvironment = RANDOM_PORT)
  @AutoConfigureTestDatabase(replace = NONE)   // используем реальную БД (Testcontainers)
  @Testcontainers
  class UserIntegrationTest {
      @Container
      static PostgreSQLContainer<?> postgres = new PostgreSQLContainer<>("postgres:16");

      @DynamicPropertySource
      static void props(DynamicPropertyRegistry r) {
          r.add("spring.datasource.url", postgres::getJdbcUrl);
          r.add("spring.datasource.username", postgres::getUsername);
          r.add("spring.datasource.password", postgres::getPassword);
      }

      @Autowired TestRestTemplate restTemplate;

      @Test
      void createAndFetchUser() { ... }
  }
  ```


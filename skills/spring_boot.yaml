  ## 3. Data Layer (JPA + Spring Data)

  ### Entity
  ```java
  @Entity
  @Table(name = "users")
  public class User {
      @Id
      @GeneratedValue(strategy = GenerationType.IDENTITY)
      private Long id;

      @Column(nullable = false, length = 100)
      private String name;

      @Column(nullable = false, unique = true)
      private String email;

      @CreationTimestamp
      @Column(updatable = false)
      private Instant createdAt;

      @UpdateTimestamp
      private Instant updatedAt;

      // конструктор, геттеры (без сеттеров если возможно)
  }
  ```

  ### Repository
  ```java
  public interface UserRepository extends JpaRepository<User, Long> {
      Optional<User> findByEmail(String email);
      boolean existsByEmail(String email);

      @Query("SELECT u FROM User u WHERE u.createdAt > :since")
      List<User> findCreatedAfter(@Param("since") Instant since);

      // Для сложных запросов — @NativeQuery или Specification
  }
  ```

  ### Транзакции
  ```java
  @Service
  @Transactional(readOnly = true)          // default — read-only
  @RequiredArgsConstructor
  public class UserService {

      @Transactional                        // переопределяем для write-операций
      public UserResponse create(CreateUserRequest request) { ... }

      // readOnly наследуется для этого метода
      public UserResponse findById(Long id) {
          return repo.findById(id)
              .map(mapper::toResponse)
              .orElseThrow(() -> new ResourceNotFoundException("User", id));
      }
  }
  ```


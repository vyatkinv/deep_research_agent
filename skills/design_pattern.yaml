name: design_pattern
description: "Применяет паттерн проектирования (Factory, Strategy, Builder, Observer...) к существующему коду"
output_format: files

skill_prompt: |
  Твоя задача — применить паттерн проектирования к существующему коду.

  Если паттерн не указан явно — предложи наиболее подходящий исходя из проблемы.

  Часто применяемые паттерны в Java:

  **Порождающие:**
  - **Factory Method** — создание объектов через метод, скрывающий детали
  - **Builder** — для классов с множеством опциональных параметров
  - **Singleton** — один экземпляр (в Spring обычно не нужен явно)

  **Структурные:**
  - **Decorator** — добавление поведения без наследования
  - **Adapter** — обёртка для несовместимых интерфейсов
  - **Facade** — упрощённый интерфейс к сложной подсистеме

  **Поведенческие:**
  - **Strategy** — замена if/else с алгоритмами на полиморфизм
  - **Observer / Event** — уведомление подписчиков об изменениях
  - **Command** — инкапсуляция действия в объект
  - **Chain of Responsibility** — цепочка обработчиков (pipeline)
  - **Template Method** — каркас алгоритма с переопределяемыми шагами
  - **State** — объект меняет поведение в зависимости от состояния

  Для каждого применения:
  1. Объясни зачем именно этот паттерн
  2. Покажи структуру до и после
  3. Создай новые классы/интерфейсы
  4. Обнови существующий код
  5. Напиши тест демонстрирующий работу паттерна

workflow_hint: |
  1. read_file — прочитай код где нужно применить паттерн
  2. Выбери/подтверди паттерн, объясни почему
  3. Нарисуй структуру (текстом): интерфейсы, классы, связи
  4. write_file — создай новые файлы (интерфейсы, реализации)
  5. write_file — обнови существующий код
  6. write_file — тест для паттерна
  7. run_maven("test") или run_gradle("test")

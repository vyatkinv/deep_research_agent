name: code_review
description: "Детальное ревью кода: SOLID, code smells, безопасность, производительность, тестируемость"
output_format: report

skill_prompt: |
  Твоя задача — провести качественное code review.
  Не исправляй код сам (если не попросят) — давай конкретные, actionable замечания.

  Проверяй по категориям:

  ### 🔴 Критические проблемы (нужно исправить до мержа)
  - Потенциальные NPE, утечки ресурсов, race conditions
  - SQL/Command injection, уязвимости безопасности
  - Некорректная обработка исключений (поглощение, неправильные типы)
  - Логические ошибки в бизнес-логике

  ### 🟡 Важные замечания (стоит исправить)
  - Нарушения SOLID (особенно SRP и DI)
  - Дублирование кода (DRY)
  - Слишком длинные методы (>20 строк — повод задуматься)
  - Магические числа и строки без констант
  - Отсутствие валидации входных данных

  ### 🟢 Улучшения (nice to have)
  - Возможность использовать современный Java API
  - Именование (неточные имена переменных/методов/классов)
  - Javadoc для публичного API
  - Тестируемость (плохая изоляция зависимостей)

  Для каждого замечания указывай: файл, строку (если возможно), описание проблемы, рекомендацию.

workflow_hint: |
  1. get_project_structure — обзор проекта
  2. find_files("**/*.java") — список Java-файлов
  3. read_file для каждого файла под ревью
  4. search_in_files — проверь паттерны (e.printStackTrace, System.out, TODO, FIXME)
  5. Сформируй структурированный отчёт по категориям выше

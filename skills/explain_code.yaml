name: explain_code
description: "Объясняет как работает класс, метод или блок кода — для онбординга и документации"
output_format: explanation

skill_prompt: |
  Твоя задача — понятно объяснить как работает указанный код.

  Структура объяснения:
  1. **Назначение** — зачем этот код существует, какую проблему решает.
  2. **Входные данные** — что принимает (параметры, зависимости, предусловия).
  3. **Как работает** — алгоритм/логика шаг за шагом, простым языком.
  4. **Выходные данные** — что возвращает / какой side effect.
  5. **Граничные случаи** — что происходит при null, пустых списках, ошибках.
  6. **Зависимости** — на какие другие классы/сервисы полагается.
  7. **Пример использования** — короткий код-сниппет как это вызывается.

  Избегай пересказа кода строка-в-строку. Объясняй смысл, а не синтаксис.
  Если в коде есть неочевидные трюки или паттерны — объясни их отдельно.

workflow_hint: |
  1. read_file — прочитай указанный файл/класс
  2. search_in_files — найди где этот класс используется (контекст вызова)
  3. find_files — найди тесты для этого класса (они часто объясняют поведение)
  4. read_file для тестов — посмотри сценарии использования
  5. Напиши объяснение согласно структуре выше

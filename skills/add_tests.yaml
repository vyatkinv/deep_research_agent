name: add_tests
description: "Дописывает JUnit 5 тесты к существующему коду без тестового покрытия"
output_format: files

skill_prompt: |
  Твоя задача — написать тесты для существующего кода.

  Стек: JUnit 5, AssertJ, Mockito (только для внешних зависимостей).

  Стратегия тестирования для каждого публичного метода:
  - **Happy path** — нормальный сценарий с типичными данными
  - **Edge cases** — граничные значения: null, пустые коллекции, 0, Long.MAX_VALUE
  - **Error cases** — что происходит при невалидных данных или ошибках зависимостей

  Правила:
  - Один тест-класс на один production-класс
  - Имя теста: should_<ожидаемый результат>_when_<условие>
  - @DisplayName с человекочитаемым описанием на русском или английском
  - Структура: // given / // when / // then (Arrange-Act-Assert)
  - Не тестируй геттеры/сеттеры и тривиальный код
  - Мокируй только то что выходит за границы класса (репозитории, HTTP-клиенты)
  - Для Spring-компонентов используй @ExtendWith(MockitoExtension.class), не поднимай контекст без необходимости

workflow_hint: |
  1. read_file — прочитай production-класс
  2. find_files("**/*Test.java") — посмотри стиль существующих тестов
  3. read_pom_or_build_file — проверь наличие JUnit 5, AssertJ, Mockito в зависимостях
  4. Напиши тест-класс в зеркальном пакете (src/test/java/...)
  5. write_file — сохрани тест
  6. run_maven("test -pl . -Dtest=<ClassName>Test") или run_gradle("test --tests <ClassName>Test")
  7. Если тесты падают — прочитай вывод и исправь

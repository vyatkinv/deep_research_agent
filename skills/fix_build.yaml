name: fix_build
description: "Исправляет ошибки компиляции: запускает сборку, читает ошибки, правит код, повторяет до успеха"
output_format: files
has_subgraph: true

skill_prompt: |
  Твоя задача — добиться успешной компиляции проекта.
  Работай итеративно: запусти → прочитай ошибки → исправь → повтори.

  Типичные ошибки компиляции и как их решать:
  - **cannot find symbol** — неверное имя, отсутствующий импорт или класс
  - **incompatible types** — неверный каст или возвращаемый тип
  - **method does not override** — сигнатура не совпадает с родительским
  - **package does not exist** — отсутствующая зависимость в pom.xml/build.gradle
  - **illegal start of expression** — синтаксическая ошибка (пропущена скобка, точка с запятой)
  - **class is public, should be declared in file** — имя файла не совпадает с именем класса

  После каждого исправления:
  - Перечитай файл целиком — убедись что исправление не создало новых ошибок
  - Запусти компиляцию снова
  - Не исправляй все файлы сразу — делай по одному, следи за прогрессом

workflow_hint: |
  ЦИКЛ (повторять до успеха, максимум 10 итераций):
  1. run_maven("compile -q") или run_gradle("compileJava") — получи ошибки
  2. Если ошибок нет → SUCCESS, остановись
  3. Прочитай каждый файл с ошибкой (read_file)
  4. Исправь ошибки (write_file)
  5. Вернись к шагу 1

  Если после 10 итераций ошибки остались — сообщи что именно не удалось исправить и почему.

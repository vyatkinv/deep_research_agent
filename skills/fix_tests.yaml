name: fix_tests
description: "Исправляет падающие тесты: запускает, читает failures, правит код или тесты, повторяет"
output_format: files
has_subgraph: true

skill_prompt: |
  Твоя задача — добиться прохождения всех тестов.
  Работай итеративно: запусти тесты → прочитай что упало → исправь → повтори.

  Классификация падений:
  - **Compilation error в тестах** — сначала исправь, потом запускай
  - **AssertionError** — тест упал из-за несовпадения ожидаемого/фактического значения.
    Реши: баг в production-коде или неверное ожидание в тесте?
  - **NullPointerException** — проблема с инициализацией моков или данных в тесте
  - **Exception in setup** — @BeforeEach падает, тест даже не запускается
  - **Timeout** — тест слишком медленный или завис (проблема с mock/stub)
  - **Flaky test** — тест иногда проходит, иногда нет (concurrency, порядок выполнения)

  Принципы исправления:
  - Сначала поми что должен проверять тест (read_file + прочитай production-код)
  - Если тест тестирует правильное поведение — исправляй production-код
  - Если тест тестирует неверное ожидание — исправляй тест с объяснением
  - НЕ удаляй тесты и НЕ делай @Disabled без объяснения

workflow_hint: |
  ЦИКЛ (повторять до SUCCESS):
  1. run_maven("test") или run_gradle("test") — получи список падений
  2. Если все тесты прошли → SUCCESS, остановись
  3. Для каждого упавшего теста:
     a. read_file — прочитай тест
     b. read_file — прочитай production-класс который тестируется
     c. Определи причину падения
     d. write_file — исправь (production или тест, с объяснением)
  4. run_maven("test") или run_gradle("test") снова
  5. Повтори (максимум 10 итераций)

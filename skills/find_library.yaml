name: find_library
description: "Исследует и рекомендует лучшую Java-библиотеку под задачу, добавляет зависимость в проект"
output_format: report

skill_prompt: |
  Твоя задача — найти и подключить подходящую Java-библиотеку.

  Шаг 1: Анализ требований
  - Прочитай контекст проекта (pom.xml, существующие зависимости)
  - Определи точные требования: что должна делать библиотека
  - Выясни ограничения: лицензия, Java-версия, Spring-совместимость

  Шаг 2: Сравнение вариантов
  Для каждого кандидата оцени:
  - Популярность (звёзды GitHub, Maven Central downloads)
  - Активность поддержки (последний коммит, open issues)
  - Лицензия (Apache 2.0, MIT — предпочтительно)
  - Совместимость с текущим стеком
  - Размер артефакта и транзитивные зависимости

  Шаг 3: Рекомендация
  - Выбери победителя с обоснованием
  - Укажи версию для подключения
  - Покажи минимальный пример использования

  Шаг 4: Подключение (если попросят)
  - Добавь dependency в pom.xml / build.gradle
  - Запусти сборку чтобы убедиться что зависимость скачивается
  - Покажи hello-world пример в контексте проекта

workflow_hint: |
  1. read_pom_or_build_file — текущие зависимости и стек
  2. get_project_structure — контекст проекта
  3. Сформируй список из 3-5 библиотек-кандидатов
  4. Для каждой — собери информацию (версия, лицензия, pros/cons)
  5. Выбери лучшую, объясни выбор
  6. Если нужно подключить: write_file (обнови pom.xml), run_maven("compile")

name: generate_docs
description: "Генерирует Javadoc для публичного API и/или README для модуля"
output_format: files

skill_prompt: |
  Твоя задача — написать документацию для Java-кода.

  ### Javadoc (для публичного API)
  Документируй: публичные классы, публичные методы, публичные поля.
  НЕ документируй: приватные методы, геттеры/сеттеры, тривиальный код.

  Шаблон для класса:
  ```java
  /**
   * Краткое описание в одном предложении.
   *
   * <p>Расширенное описание: зачем существует, в каком контексте используется,
   * какие инварианты соблюдает.
   *
   * @author (опционально)
   * @since x.y (версия когда появился)
   */
  ```

  Шаблон для метода:
  ```java
  /**
   * Что делает метод (начинай с глагола: Returns, Creates, Updates...).
   *
   * @param name описание параметра
   * @return что возвращает (или void — тогда @return не нужен)
   * @throws ExceptionType когда бросается
   */
  ```

  ### README для модуля (если попросят)
  Структура:
  - Назначение модуля (2-3 предложения)
  - Зависимости (что нужно для работы)
  - Быстрый старт (минимальный пример использования)
  - Конфигурация (ключевые настройки)
  - Основные классы/интерфейсы и их роли

workflow_hint: |
  1. get_project_structure — обзор
  2. find_files("**/*.java") — найди публичные классы
  3. read_file — прочитай каждый файл
  4. search_in_files("public", "**/*.java") — найди публичный API
  5. write_file — добавь Javadoc в каждый файл
  6. run_maven("javadoc:javadoc") или run_gradle("javadoc") — проверь что Javadoc компилируется без ошибок
